name: daily-brand-update
# The deterministic half of the daily automation: refresh the ideas bank
# and posting strategy, commit to main. The judgement layer runs on top:
# either the Claude step below (needs the ANTHROPIC_API_KEY repo secret)
# or the scheduled Claude session (Routine) that works the same brief.

on:
  schedule:
    - cron: '43 22 * * *'   # 22:43 UTC = 06:43 SGT, daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh ideas bank + posting strategy (deterministic)
        run: node scripts/ideas-bank.mjs

      - name: Claude judgement layer (runs only when the API key secret is set)
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "$(cat automation/daily-update.md)" \
            --dangerously-skip-permissions \
            --max-turns 40 || echo "Claude layer failed; deterministic update still lands."

      - name: Self-test (hermetic; never touches data/)
        run: node scripts/self-test.mjs

      - name: Commit and push
        run: |
          git config user.name "brand-engine-automation"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "Daily brand update: ideas bank + strategy (automated)"
          git push
